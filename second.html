<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>진짜 없어요...</title>
  <meta property="og:title" content="진짜 없어요..." />
  <meta property="og:description" content="여기까지 왔지만 기프티콘은 없습니다." />
  <meta name="description" content="여기까지 왔지만 기프티콘은 없습니다." />
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    }

    body {
      position: relative;
      background: radial-gradient(circle at top, #fff5f5 0%, #ffd9d9 40%, #b51f1f 100%);
      color: #fff8f8;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.18), transparent 22%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,0.14), transparent 18%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.12), transparent 24%);
    }

    .header {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 520px;
      text-align: center;
      background: rgba(120, 16, 16, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 18px 18px 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 30px rgba(80, 5, 5, 0.18);
      z-index: 10;
    }

    .header h1 {
      margin: 0;
      font-size: 1.7rem;
      line-height: 1.2;
    }

    .header p {
      margin: 10px 0 0;
      font-size: 0.96rem;
      line-height: 1.6;
      color: #ffe8e8;
      word-break: keep-all;
    }

    .playground {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .cup {
      position: absolute;
      width: 78px;
      height: 104px;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      animation: floatY 3.2s ease-in-out infinite;
      filter: drop-shadow(0 8px 18px rgba(80, 10, 10, 0.28));
    }

    .cup-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform: rotate(var(--rotate, -6deg));
      transition: transform 0.15s ease;
    }

    .cup:active .cup-inner,
    .cup:hover .cup-inner {
      transform: rotate(var(--rotate, -6deg)) scale(1.06);
    }

    .lid {
      position: absolute;
      top: 8px;
      left: 10px;
      width: 58px;
      height: 12px;
      background: #f5ebe4;
      border-radius: 10px;
      border: 1px solid rgba(120, 120, 120, 0.18);
    }

    .straw {
      position: absolute;
      top: -2px;
      left: 40px;
      width: 6px;
      height: 26px;
      background: repeating-linear-gradient(
        to bottom,
        #1c9a4a 0,
        #1c9a4a 6px,
        #f5f5f5 6px,
        #f5f5f5 12px
      );
      border-radius: 4px;
      transform: rotate(7deg);
    }

    .body {
      position: absolute;
      top: 18px;
      left: 14px;
      width: 50px;
      height: 72px;
      background: linear-gradient(180deg, #fefefe 0%, #f3f3f3 100%);
      clip-path: polygon(8% 0%, 92% 0%, 78% 100%, 22% 100%);
      border: 1px solid rgba(120, 120, 120, 0.15);
    }

    .logo {
      position: absolute;
      top: 40px;
      left: 28px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #0f8b45;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.82);
    }

    .ice {
      position: absolute;
      bottom: 12px;
      left: 25px;
      width: 28px;
      height: 18px;
      background: linear-gradient(180deg, rgba(120, 86, 60, 0.22), rgba(84, 58, 40, 0.34));
      border-radius: 10px 10px 16px 16px;
    }

    .bubble {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(30px);
      background: rgba(120, 10, 10, 0.9);
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 20;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.16);
      pointer-events: none;
    }

    .bubble.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .counter {
      position: absolute;
      right: 16px;
      bottom: 16px;
      background: rgba(255,255,255,0.16);
      color: #fff4f4;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 10px 14px;
      font-size: 0.9rem;
      backdrop-filter: blur(6px);
      z-index: 12;
    }

    @keyframes floatY {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .header {
        top: 14px;
        width: calc(100% - 24px);
        padding: 16px 14px 14px;
      }

      .header h1 {
        font-size: 1.45rem;
      }

      .header p {
        font-size: 0.9rem;
      }

      .cup {
        width: 70px;
        height: 96px;
      }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="header">
    <h1>여기까지 왔지만...</h1>
    <p>떠다니는 아메리카노를 눌러보세요.<br>혹시 진짜가 있을 거라고 생각하셨나요?</p>
  </div>

  <div class="playground" id="playground"></div>
  <div class="bubble" id="bubble">그림의 떡!</div>
  <div class="counter" id="counter">낚인 횟수: 0</div>

  <script>
    const playground = document.getElementById('playground');
    const bubble = document.getElementById('bubble');
    const counter = document.getElementById('counter');
    let clickCount = 0;

    function showBubble(text) {
      bubble.textContent = text;
      bubble.classList.add('show');
      clearTimeout(showBubble.timer);
      showBubble.timer = setTimeout(() => {
        bubble.classList.remove('show');
      }, 1100);
    }

    function createCup(index) {
      const cup = document.createElement('div');
      cup.className = 'cup';
      cup.style.left = `${Math.random() * 82 + 6}%`;
      cup.style.top = `${Math.random() * 58 + 24}%`;
      cup.style.animationDuration = `${2.6 + Math.random() * 2.4}s`;
      cup.style.animationDelay = `${Math.random() * 1.2}s`;
      cup.innerHTML = `
        <div class="cup-inner" style="--rotate:${-10 + Math.random() * 20}deg">
          <div class="straw"></div>
          <div class="lid"></div>
          <div class="body"></div>
          <div class="logo"></div>
          <div class="ice"></div>
        </div>
      `;

      cup.addEventListener('click', () => {
        clickCount += 1;
        counter.textContent = `낚인 횟수: ${clickCount}`;

        const lines = [
          '그림의 떡!',
          '아쉽지만 이건 장식입니다 😌',
          '눌러도 기프티콘은 안 나와요 😏',
          '진짜였으면 저도 좋았을 텐데요 ☕',
          '한 번 더 눌러도 없습니다 🙂'
        ];
        showBubble(lines[Math.floor(Math.random() * lines.length)]);

        cup.style.left = `${Math.random() * 82 + 6}%`;
        cup.style.top = `${Math.random() * 58 + 24}%`;
      });

      playground.appendChild(cup);
    }

    for (let i = 0; i < 10; i += 1) {
      createCup(i);
    }
  </script>
</body>
</html>
