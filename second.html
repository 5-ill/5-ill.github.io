<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>여기까지 왔네?</title>
  <meta property="og:title" content="여기까지 왔네?" />
  <meta property="og:description" content="페이지를 열어 내용을 확인해주세요." />
  <meta name="description" content="페이지를 열어 내용을 확인해주세요." />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
      background: linear-gradient(145deg, #3a0a0a 0%, #8b1e1e 45%, #ffeaea 100%);
      color: #fff1f1;
      text-align: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(120, 20, 20, 0.9);
      border: 1px solid rgba(255, 245, 236, 0.18);
      border-radius: 28px;
      padding: 34px 24px 28px;
      box-shadow: 0 20px 56px rgba(20, 6, 9, 0.34);
      animation: pop 0.45s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 244, 236, 0.08), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .emoji {
      font-size: 56px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.2;
      color: #fff6ef;
      position: relative;
      z-index: 1;
    }

    p {
      margin: 14px 0 0;
      color: #ffe0e0;
      line-height: 1.75;
      font-size: 1rem;
      position: relative;
      z-index: 1;
      word-break: keep-all;
    }

    .tag {
      display: inline-block;
      margin-top: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 220, 220, 0.15);
      color: #ffdede;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      position: relative;
      z-index: 1;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 24px;
      position: relative;
      z-index: 1;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.97;
    }

    .primary {
      background: #ffe5e5;
      color: #7a1010;
      box-shadow: 0 10px 24px rgba(15, 4, 7, 0.24);
    }

    .ghost {
      background: rgba(255, 230, 230, 0.08);
      color: #ffecec;
      border: 1px solid rgba(255, 245, 236, 0.18);
    }

    .small {
      margin-top: 18px;
      font-size: 0.87rem;
      color: #ffd6d6;
      line-height: 1.7;
      position: relative;
      z-index: 1;
      min-height: 44px;
      word-break: keep-all;
    }

    @keyframes pop {
      from {
        transform: scale(0.97);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 18px;
      }

      .card {
        padding: 30px 20px 24px;
        border-radius: 24px;
      }

      h1 {
        font-size: 1.86rem;
      }

      p {
        font-size: 0.96rem;
      }

      button {
        font-size: 0.93rem;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="emoji">❤️</div>
    <h1>여기까지 온 당신!</h1>
    <p>
      하지만 기프티콘은 진짜 없습니다....<br />
      이제 그만해주세요.... 진짜 없어요.....
    </p>
    <div class="tag">APRIL FOOLS</div>

    <div class="buttons">
      <button class="ghost" onclick="goToClubSite()">동아리 홈페이지 구경가기</button>
      <button class="primary" onclick="location.reload()">진짜 스타벅스 기프티콘이 나올때까지 새로고침하기</button>
    </div>

    <div class="small" id="message">여기까지 온 집념은 인정합니다. 그래도 기프티콘은 없습니다 🙂</div>
  </main>

  <script>
    const refreshKey = 'aprilFoolsRefreshCount';
    const redirectAfter = 5;
    const redirectUrl = 'https://example.com';

    function trackRefreshAndRedirect() {
      const navigationEntries = performance.getEntriesByType('navigation');
      const isReload = navigationEntries.length > 0 && navigationEntries[0].type === 'reload';

      let count = Number(localStorage.getItem(refreshKey) || '0');

      if (isReload) {
        count += 1;
      } else if (!sessionStorage.getItem('aprilFoolsVisited')) {
        count = 0;
        sessionStorage.setItem('aprilFoolsVisited', 'true');
      }

      localStorage.setItem(refreshKey, String(count));

      if (count >= redirectAfter) {
        localStorage.removeItem(refreshKey);
        window.location.href = redirectUrl;
      }
    }

    function goToClubSite() {
      window.location.href = 'https://www.ycc.club/';
    }

    trackRefreshAndRedirect();
  </script>
</body>
</html>
